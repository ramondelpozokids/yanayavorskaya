<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias — Yana Yavorskaya</title>
  <link rel="stylesheet" href="css/museum.css">
  <link rel="icon" href="assets/logo.png" type="image/png">
  <script src="js/db.js"></script>
  <script src="js/i18n.js"></script>
  <script>setTimeout(function(){MuseoI18n.init();},50);</script>
  <style>
    .news-page { padding: 8rem 0 4rem; min-height: 100vh; }
    .news-hero { margin-bottom: var(--spacing-xl); }
    .news-hero h1 { margin-bottom: 0.5rem; }
    .back-link { display: inline-block; margin-bottom: 2rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); }
    .back-link:hover { color: var(--accent); }
    .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: var(--spacing-lg); }
    .news-card { border: 1px solid var(--border); background: var(--bg); transition: transform var(--transition-medium), box-shadow var(--transition-medium); }
    .news-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .news-card__image { aspect-ratio: 16/9; overflow: hidden; background: var(--bg-alt); }
    .news-card__image img { width: 100%; height: 100%; object-fit: cover; transition: transform var(--transition-slow); }
    .news-card:hover .news-card__image img { transform: scale(1.03); }
    .news-card__body { padding: 1.8rem; }
    .news-card__date { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 0.5rem; }
    .news-card__category { display: inline-block; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.15rem 0.5rem; border: 1px solid var(--border); margin-bottom: 0.8rem; color: var(--text-tertiary); }
    .news-card__title { font-family: var(--serif); font-size: 1.4rem; font-weight: 400; line-height: 1.3; margin-bottom: 0.6rem; }
    .news-card__text { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.75; }
    @media(max-width:768px){ .news-grid { grid-template-columns: 1fr; } }
  </style>
  <meta name="vercel-toolbar" content="false">
</head>
<body>

    <!-- ===== CHAT ASSISTANT (BOTTOM RIGHT) ===== -->
<div class="chat-assistant">
  <button class="chat-assistant__trigger" id="chat-trigger" aria-label="Abrir chat">
    <img src="assets/logo.png" alt="" width="34" height="34">
  </button>
</div>
<div class="chat-panel" id="chat-panel" role="dialog" aria-hidden="true">
  <div class="chat-panel__header">
    <img src="assets/logo.png" alt="" width="36" height="36">
    <div class="chat-panel__header-info">
      <div class="chat-panel__header-name" data-i18n="chat.name">Yana Yavorskaya</div>
      <div class="chat-panel__header-status" data-i18n="chat.status">Comisaria Digital · Disponible</div>
    </div>
    <button class="chat-panel__close" id="chat-close" aria-label="Cerrar chat">✕</button>
  </div>
  <div class="chat-panel__messages" id="chat-messages"></div>
  <div class="chat-panel__quick-replies" id="chat-quick">
    <button class="chat-panel__quick-reply" data-msg="Háblame de la colección Luz y Sombra" data-i18n="chat.q1">Luz y Sombra</button>
    <button class="chat-panel__quick-reply" data-msg="¿Hay obras disponibles?" data-i18n="chat.q3">Disponibilidad</button>
    <button class="chat-panel__quick-reply" data-msg="¿Qué técnica utilizas?" data-i18n="chat.q2">Técnica</button>
    <button class="chat-panel__quick-reply" data-msg="Cuéntame sobre las exposiciones" data-i18n="chat.q4">Exposiciones</button>
  </div>
  <div class="chat-panel__input-area">
    <input type="text" id="chat-input" placeholder="Escribe tu pregunta…" data-i18n="chat.placeholder">
    <button id="chat-send" data-i18n="chat.send">Enviar</button>
  </div>
</div>

<!-- ===== SCROLL UP (BOTTOM LEFT) ===== -->
<button class="scroll-up" id="scroll-up" aria-label="Volver arriba" title="Volver arriba">
  <svg viewBox="0 0 24 24" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
</button>
</body>
</html>
