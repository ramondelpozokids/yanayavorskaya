<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    .shop-page { padding: 8rem 0 4rem; min-height: 100vh; }
    .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: var(--spacing-lg); margin-top: var(--spacing-lg); }
    .shop-card { border: 1px solid var(--border); background: var(--bg); transition: transform var(--transition-medium), box-shadow var(--transition-medium); display: flex; flex-direction: column; }
    .shop-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .shop-card__image { aspect-ratio: 3/4; overflow: hidden; position: relative; cursor: pointer; }
    .shop-card__image img { width: 100%; height: 100%; object-fit: cover; transition: transform var(--transition-slow); }
    .shop-card:hover .shop-card__image img { transform: scale(1.05); }
    .shop-card__overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity var(--transition-medium); }
    .shop-card:hover .shop-card__overlay { opacity: 1; }
    .shop-card__overlay span { color: #fff; font-family: var(--serif); font-size: 1.1rem; letter-spacing: 0.05em; border: 1px solid rgba(255,255,255,0.5); padding: 0.5rem 1.5rem; }
    .shop-card__badge { position: absolute; top: 1rem; left: 1rem; background: var(--accent); color: #fff; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.2rem 0.6rem; }
    .shop-card__badge--vendida { background: #999; }
    .shop-card__badge--reservada { background: var(--text-tertiary); }
    .shop-card__body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
    .shop-card__title { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; margin-bottom: 0.3rem; }
    .shop-card__collection { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 0.5rem; }
    .shop-card__meta { font-size: 0.7rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.6rem; }
    .shop-card__desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.65; flex: 1; margin-bottom: 1rem; }
    .shop-card__footer { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; padding-top: 1rem; border-top: 1px solid var(--border-light); }
    .shop-card__price { font-family: var(--serif); font-size: 1.15rem; color: var(--text); }
    .shop-card__price-note { font-size: 0.6rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; }
    .shop-card__action { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.45rem 1rem; border: 1px solid var(--accent); color: var(--accent); background: none; cursor: pointer; transition: all var(--transition-fast); font-family: var(--sans); }
    .shop-card__action:hover { background: var(--accent); color: #fff; }
    .shop-intro { max-width: 650px; margin-top: 0.5rem; }
    .shop-intro p { font-size: 1rem; color: var(--text-secondary); line-height: 1.7; }
    .shop-intro__note { margin-top: 1rem; padding: 1.2rem; border-left: 2px solid var(--accent); background: var(--bg-alt); font-size: 0.85rem; color: var(--text-tertiary); line-height: 1.6; }
    .shop-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: var(--spacing-md); }
    .shop-filter { padding: 0.35rem 0.9rem; border: 1px solid var(--border); background: none; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); transition: all var(--transition-fast); font-family: var(--sans); }
    .shop-filter:hover, .shop-filter.active { border-color: var(--accent); color: var(--accent); }
    /* Lightbox premium */
    .lb-overlay { display: none; position: fixed; inset: 0; z-index: 999999 !important; background: rgba(10,10,10,0.95); align-items: center; justify-content: center; flex-direction: column; }
    .lb-overlay.is-open { display: flex; }
    .lb-close { position: absolute; top: 1.5rem; right: 1.5rem; z-index: 10; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; width: 44px; height: 44px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast); }
    .lb-close:hover { background: rgba(255,255,255,0.2); }
    .lb-content { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; width: 90%; max-width: 1200px; max-height: 85vh; align-items: center; padding: 2rem; }
    .lb-image { width: 100%; height: min(70vh, 600px); overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .lb-image img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.3s ease; cursor: zoom-in; }
    .lb-image img.zoomed { transform: scale(1.8); cursor: zoom-out; }
    .lb-info { color: #fff; overflow-y: auto; max-height: 70vh; padding-right: 1rem; }
    .lb-info h2 { font-size: 1.8rem; margin-bottom: 0.3rem; }
    .lb-info .lb-collection { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 0.8rem; }
    .lb-info .lb-meta-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; font-size: 0.75rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.05em; }
    .lb-info .lb-price { font-family: var(--serif); font-size: 1.4rem; color: var(--accent); margin-bottom: 0.2rem; }
    .lb-info .lb-status { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1.2rem; }
    .lb-info .lb-desc { font-size: 0.9rem; line-height: 1.8; color: rgba(255,255,255,0.6); margin-bottom: 1.5rem; }
    .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; width: 48px; height: 48px; border-radius: 50%; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast); z-index: 10; }
    .lb-nav:hover { background: rgba(255,255,255,0.18); }
    .lb-prev { left: 1rem; }
    .lb-next { right: 1rem; }
    .lb-counter { position: absolute; top: 1.5rem; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .back-link { display: inline-block; margin-bottom: 2rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); }
    .back-link:hover { color: var(--accent); }
    .cert-block { margin-top: var(--spacing-lg); padding: 1.2rem; border: 1px solid var(--border); font-size: 0.8rem; color: var(--text-tertiary); text-align: center; }
    @media(max-width:768px){ .shop-grid { grid-template-columns: 1fr; } .lb-content { grid-template-columns: 1fr; gap: 1rem; padding: 1rem; } .lb-image { height: 40vh; } .lb-nav { width: 38px; height: 38px; font-size: 1rem; } }
  </style>
  <meta name="vercel-toolbar" content="false">
</head>

    <!-- ===== CHAT ASSISTANT (BOTTOM RIGHT) ===== -->
<div class="chat-assistant">
  <button class="chat-assistant__trigger" id="chat-trigger" aria-label="Abrir chat">
    <img src="assets/logo.png" alt="" width="34" height="34">
  </button>
</div>
<div class="chat-panel" id="chat-panel" role="dialog" aria-hidden="true">
  <div class="chat-panel__header">
    <img src="assets/logo.png" alt="" width="36" height="36">
    <div class="chat-panel__header-info">
      <div class="chat-panel__header-name" data-i18n="chat.name">Yana Yavorskaya</div>
      <div class="chat-panel__header-status" data-i18n="chat.status">Comisaria Digital · Disponible</div>
    </div>
    <button class="chat-panel__close" id="chat-close" aria-label="Cerrar chat">✕</button>
  </div>
  <div class="chat-panel__messages" id="chat-messages"></div>
  <div class="chat-panel__quick-replies" id="chat-quick">
    <button class="chat-panel__quick-reply" data-msg="Háblame de la colección Luz y Sombra" data-i18n="chat.q1">Luz y Sombra</button>
    <button class="chat-panel__quick-reply" data-msg="¿Hay obras disponibles?" data-i18n="chat.q3">Disponibilidad</button>
    <button class="chat-panel__quick-reply" data-msg="¿Qué técnica utilizas?" data-i18n="chat.q2">Técnica</button>
    <button class="chat-panel__quick-reply" data-msg="Cuéntame sobre las exposiciones" data-i18n="chat.q4">Exposiciones</button>
  </div>
  <div class="chat-panel__input-area">
    <input type="text" id="chat-input" placeholder="Escribe tu pregunta…" data-i18n="chat.placeholder">
    <button id="chat-send" data-i18n="chat.send">Enviar</button>
  </div>
</div>

<!-- ===== SCROLL UP (BOTTOM LEFT) ===== -->
<button class="scroll-up" id="scroll-up" aria-label="Volver arriba" title="Volver arriba">
  <svg viewBox="0 0 24 24" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
</button>
