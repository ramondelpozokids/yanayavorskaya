<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Página no encontrada — Museo Digital</title>
  <link rel="stylesheet" href="css/museum.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>✦</text></svg>">
  <style>
    .not-found { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; min-height:100dvh; text-align:center; padding:2rem; background:var(--bg); }
    .not-found__code { font-family:var(--serif); font-size:clamp(4rem, 10vw, 8rem); font-weight:300; color:var(--accent); line-height:1; margin-bottom:1rem; }
    .not-found__title { font-family:var(--serif); font-size:clamp(1.5rem, 3vw, 2rem); font-weight:400; margin-bottom:0.5rem; }
    .not-found__text { color:var(--text-tertiary); margin-bottom:2rem; max-width:400px; }
  </style>
</head>
<body>
  <main class="not-found">
    <div class="not-found__code">404</div>
    <h1 class="not-found__title">Esta sala no existe</h1>
    <p class="not-found__text">La obra que buscas no está en esta galería. Quizá fue trasladada, vendida, o aún no ha sido pintada.</p>
    <a href="/" class="btn btn--outline">Volver al inicio</a>
  </main>
</body>
</html>
