<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sobre mí — Yana Yavorskaya</title>
  <link rel="stylesheet" href="css/museum.css">
  <link rel="icon" href="assets/logo.png" type="image/png">
  <script src="js/db.js"></script>
  <script src="js/i18n.js"></script>
  <script>setTimeout(function(){MuseoI18n.init();},50);</script>
  <style>
    .bio-page { padding: 8rem 0 4rem; min-height: 100vh; }
    .bio-hero { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-xl); align-items: center; margin-bottom: var(--spacing-xl); }
    .bio-hero__image { aspect-ratio: 3/4; overflow: hidden; }
    .bio-hero__image img { width: 100%; height: 100%; object-fit: cover; }
    .bio-hero__text h1 { margin-bottom: 1rem; }
    .bio-hero__text .lead { font-family: var(--serif); font-size: 1.3rem; font-style: italic; color: var(--accent); margin-bottom: 1.5rem; line-height: 1.5; }
    .bio-section { margin-top: var(--spacing-xl); max-width: 750px; }
    .bio-section h2 { margin-bottom: 1.2rem; }
    .bio-section p { font-size: 1rem; line-height: 2; color: var(--text-secondary); margin-bottom: 1.2rem; }
    .bio-section blockquote { font-family: var(--serif); font-style: italic; font-size: 1.15rem; color: var(--accent); border-left: 2px solid var(--accent); padding-left: 1.5rem; margin: 2.5rem 0; line-height: 1.6; }
    .bio-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin: var(--spacing-xl) 0; }
    .bio-gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .back-link { display: inline-block; margin-bottom: 3rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); }
    .back-link:hover { color: var(--accent); }
    @media(max-width:768px){ .bio-hero { grid-template-columns: 1fr; } }
  </style>
  <meta name="vercel-toolbar" content="false">
</head>
<body>
<nav class="nav" role="navigation">
  
</nav>

<main class="container container-wide bio-page">
  <a href="index.html" class="back-link">← Volver al inicio</a>

  <header style="margin-bottom: 3rem; border-bottom: 1px solid var(--border); padding-bottom: 2rem;">
    <span style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.2em;color:var(--text-tertiary);display:block;margin-bottom:0.5rem;" data-i18n="bio.headerLabel">Estudio & Biografía</span>
    <h1 style="font-family:var(--serif);font-size:3.5rem;font-weight:300;margin-bottom:1rem;">Yana Yavorskaya</h1>
    <p style="font-family:var(--serif);font-style:italic;font-size:1.3rem;color:var(--text-secondary);max-width:750px;" data-i18n="bio.quote">«Pintar es un acto de escucha interior en el que la materia, el silencio y el tiempo construyen un puente sensible con quien contempla la obra.»</p>
  </header>

</main>

<footer class="footer">
  
  
  
</div>


    <!-- ===== CHAT ASSISTANT (BOTTOM RIGHT) ===== -->
<div class="chat-assistant">
  <button class="chat-assistant__trigger" id="chat-trigger" aria-label="Abrir chat">
    <img src="assets/logo.png" alt="" width="34" height="34">
  </button>
</div>
<div class="chat-panel" id="chat-panel" role="dialog" aria-hidden="true">
  <div class="chat-panel__header">
    <img src="assets/logo.png" alt="" width="36" height="36">
    <div class="chat-panel__header-info">
      <div class="chat-panel__header-name" data-i18n="chat.name">Yana Yavorskaya</div>
      <div class="chat-panel__header-status" data-i18n="chat.status">Comisaria Digital · Disponible</div>
    </div>
    <button class="chat-panel__close" id="chat-close" aria-label="Cerrar chat">✕</button>
  </div>
  <div class="chat-panel__messages" id="chat-messages"></div>
  <div class="chat-panel__quick-replies" id="chat-quick">
    <button class="chat-panel__quick-reply" data-msg="Háblame de la colección Luz y Sombra" data-i18n="chat.q1">Luz y Sombra</button>
    <button class="chat-panel__quick-reply" data-msg="¿Hay obras disponibles?" data-i18n="chat.q3">Disponibilidad</button>
    <button class="chat-panel__quick-reply" data-msg="¿Qué técnica utilizas?" data-i18n="chat.q2">Técnica</button>
    <button class="chat-panel__quick-reply" data-msg="Cuéntame sobre las exposiciones" data-i18n="chat.q4">Exposiciones</button>
  </div>
  <div class="chat-panel__input-area">
    <input type="text" id="chat-input" placeholder="Escribe tu pregunta…" data-i18n="chat.placeholder">
    <button id="chat-send" data-i18n="chat.send">Enviar</button>
  </div>
</div>

<!-- ===== SCROLL UP (BOTTOM LEFT) ===== -->
<button class="scroll-up" id="scroll-up" aria-label="Volver arriba" title="Volver arriba">
  <svg viewBox="0 0 24 24" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
</button>
</body>
</html>
